name: Sync calculated player records

on:
  workflow_dispatch:
    inputs:
      date:
        description: Sync date (YYYY-MM-DD, blank for today in Korea)
        required: false
        type: string
  schedule:
    - cron: '30 8 * * *'
    - cron: '30 13 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve KST date
        id: date
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            echo "value=$INPUT_DATE" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync KBO player milestones
        env:
          KBO_SYNC_SECRET: ${{ secrets.KBO_SYNC_SECRET }}
          SYNC_DATE: ${{ steps.date.outputs.value }}
        run: |
          curl --fail-with-body --retry 2 \
            -X POST \
            -H "Authorization: Bearer $KBO_SYNC_SECRET" \
            "https://kbo-record-finder-api.vercel.app/api/kbo/records/sync?date=$SYNC_DATE"
